<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Newsletter</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: center;
      padding: 20px 0;
      font-size: 13px;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #eee;
    }

    /* LOGO */
    .logo {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      margin: 40px 0 20px;
      letter-spacing: 0.05em;
    }

    /* CATEGORY NAV */
    .categories {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-bottom: 80px;
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
      padding: 0 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 12px;
    }

    p {
      color: #555;
      font-size: 14px;
      margin-bottom: 40px;
    }

    /* FORM */
    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      font-size: 14px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    /* FOOTER SPACING */
    .spacer {
      height: 120px;
    }
  </style>
</head>

<body>

  <div class="nav">SUBSCRIBE</div>

  <div class="logo">YOUR BRAND</div>

  <div class="categories">
    <div>FASHION</div>
    <div>CREATORS</div>
    <div>CULTURE</div>
    <div>TRENDS</div>
  </div>

  <div class="container">
    <h1>Newsletter</h1>
    <p>Get insider signals before everyone else.</p>

    <form>
      <input type="email" placeholder="Enter your email" required />
      <button type="submit">Sign Up</button>
    </form>
  </div>

  <div class="spacer"></div>

</body>
</html>
